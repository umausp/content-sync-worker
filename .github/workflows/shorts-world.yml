name: shorts-world

# Render ONE English Short for the @AgyataWorld channel (tier-1 audience) from the
# freshest global-interest story, then STAGE it (commit the MP4 + metadata) for the
# human-approve gate. Nothing uploads here — approval runs shorts-upload.yml.
#
# CADENCE: driven by the agyata-cron-pinger Cloudflare Worker (workflow_dispatch),
# same as the news pipeline. Add a line to the pinger's WORKFLOWS to schedule it.
# Public repo = free minutes. Never on pull_request.
on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Target region for this run (usa | europe). Decides trend geos + playlist.'
        required: false
        default: ''

concurrency:
  group: shorts-world
  cancel-in-progress: false

permissions:
  contents: read # renders upload as artifacts (below), not committed to the repo

env:
  API_BASE: https://api.agyata.com
  SHORTS_PY: python # the workflow's venv python (set on PATH below)
  # Durable VIDEO-DEDUP ledger (Upstash Redis) — the renderer's OWN "already made a video of
  # this story?" memory, separate from the website's CF news_dedup_claims. Render step reads
  # it (drop already-published stories); upload step writes it after a successful upload.
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
  # ── LLM PROVIDER LADDER — the SAME shared router the news pipeline uses
  #    (src/providers.mjs), NVIDIA-first then the rest of the free tier, local Ollama
  #    last (user: "use AI model with NVidia following others and fallback to ollama").
  #    shorts/llm.mjs is now a thin adapter over it. A provider is skipped if its key is
  #    absent; fail-fast (one try/provider, bench on failure, never retry). This is what
  #    turns the raw article body into a clean, non-repetitive brief per story. ──
  PROVIDER_ORDER: 'nvidia,gemini,sambanova,cohere,openrouter,mistral,gitmodels,huggingface,openai,ollama'
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  NVIDIA_MODEL: 'meta/llama-3.1-8b-instruct' # fast NIM model (70b free-tier consistently timed out >30s → NVIDIA never won its primary slot; matches the proven news-p1 pipeline)
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  COHERA_API_KEY: ${{ secrets.COHERA_API_KEY }}
  COHERE_MODEL: 'command-r-08-2024'
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: 'openrouter/free' # auto-router to a free model — immune to model-ID rot
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  MISTRAL_MODEL: 'mistral-small-latest'
  GITMODELS_API_KEY: ${{ secrets.GITMODELS_API_KEY }}
  GITMODELS_MODEL: 'openai/gpt-4o-mini'
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '30'
  OLLAMA_MODEL: qwen2.5:3b # local last-resort so a summary is ALWAYS synthesised (never raw extractive)

jobs:
  render:
    runs-on: ubuntu-latest
    # Cron fires every ~2h, so there's no contention — give the render room to finish.
    # A Short is 1 story but the run still does: apt deps + Kokoro install + (cold) Ollama
    # pull + multi-source extraction/synth + ffmpeg. 20m was clipping cold runs; 40m means
    # once it starts it finishes. cancel-in-progress:false → only this ceiling can kill it.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Node deps — the shared extractor (src/extract.mjs) needs
      # @extractus/article-extractor for the Readability path. Without this the module
      # falls back to JSON-LD + og only (still works, but weaker on non-schema.org sites).
      - name: Install Node deps
        run: npm install --no-audit --no-fund

      - name: Install system deps (ffmpeg + librsvg + espeak-ng + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin espeak-ng fonts-dejavu fonts-noto-core fonts-noto-cjk fonts-noto-extra

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kokoro TTS + m2m100 translation deps
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet kokoro soundfile sentencepiece

      - name: Cache HuggingFace models (Kokoro + m2m100)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-m2m100-v1

      # OLLAMA — the LOCAL last-resort LLM so a clean summary is ALWAYS synthesised even
      # when every hosted provider 429s (the old "raw extractive → repeated words" path).
      # Best-effort: if install/pull fails the run still proceeds (hosted providers carry it).
      - name: Install + start Ollama (last-resort LLM)
        timeout-minutes: 6
        continue-on-error: true
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull "${OLLAMA_MODEL:-qwen2.5:3b}" || echo "ollama pull failed — hosted providers carry the run"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL || 'qwen2.5:3b' }}-v1

      - name: Stamp
        run: echo "SHORTS_STAMP=$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Render English Short
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXBAY_API_KEY: ${{ secrets.PIXBAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          # Region (usa | europe) chosen by the cron-pinger; blank on a manual run → the
          # renderer falls back to wall-clock alternation.
          WORLD_REGION: ${{ inputs.region }}
          # Cross-run dedup: the renderer claims story keys via api.agyata.com before
          # rendering so overlapping runs never publish the same story. Same token as ingest.
          NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
        run: node shorts/build_short.mjs world

      # AUTO-UPLOAD to YouTube as UNLISTED (privacyStatus in the meta). Runs only when
      # the channel's refresh token secret is set — until then the render just produces
      # the artifact below. Never fails the run if upload errors (best-effort). On success
      # it sets uploaded=true so the steps below DON'T publish the video as a public
      # artifact (user: "don't keep the results on public github, delete after upload").
      - name: Auto-upload to YouTube (unlisted)
        id: yt
        continue-on-error: true
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_WORLD: ${{ secrets.YT_REFRESH_TOKEN_WORLD }}
          # Region → playlist (user: USA news → USA playlist, Europe news → Europe playlist).
          YT_PLAYLIST_USA: ${{ secrets.YT_PLAYLIST_USA }}
          YT_PLAYLIST_EUROPE: ${{ secrets.YT_PLAYLIST_EUROPE }}
        # Skip cleanly if the token isn't set (env is allowed in `if`; `secrets` is not).
        run: |
          if [ -z "$YT_REFRESH_TOKEN_WORLD" ]; then echo "no refresh token — skipping upload (artifact only)"; exit 0; fi
          node shorts/upload.mjs world "$SHORTS_STAMP"
          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      # ARTIFACT is a REVIEW COPY only — kept solely when the YouTube upload did NOT happen
      # (no token yet, or upload errored). On a PUBLIC repo an artifact is publicly
      # downloadable, so once the video is safely on YouTube (unlisted) we never publish it
      # here. 1-day retention even then (user: delete the results, don't keep them around).
      - name: Upload staged Short artifact (only if NOT uploaded to YouTube)
        if: steps.yt.outputs.uploaded != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: short-world-${{ env.SHORTS_STAMP }}
          path: docs/shorts/world/
          retention-days: 1
          if-no-files-found: warn

      # PURGE the rendered MP4 + metadata from the runner workspace after upload — nothing
      # rendered ever lingers on GitHub (repo or artifact). Always runs.
      - name: Purge staged output
        if: always()
        run: rm -rf docs/shorts/world/* || true
