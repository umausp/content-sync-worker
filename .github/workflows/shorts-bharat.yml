name: shorts-bharat

# Render ONE Hindi/Hinglish Short for the @agyata_dot_com channel (India audience)
# from the freshest India story. The English story is LLM-translated to Hinglish
# (Devanagari + English proper nouns) before TTS + captions. Stages the MP4 + metadata
# for the human-approve gate; nothing uploads here.
#
# CADENCE: agyata-cron-pinger workflow_dispatch (offset from shorts-world). Public repo.
on:
  workflow_dispatch: {}

concurrency:
  group: shorts-bharat
  cancel-in-progress: false

permissions:
  contents: read

env:
  API_BASE: https://api.agyata.com
  SHORTS_PY: python
  # EN→Hindi is now done OFFLINE by the m2m100 model (translate_hi.py) — no LLM API
  # keys, no rate limits. (Old Gemini/SambaNova/OpenRouter/Groq keys no longer needed.)

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps (ffmpeg + librsvg + Devanagari fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin espeak-ng fonts-noto-core fonts-noto-cjk fonts-noto-extra

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kokoro TTS + m2m100 translation deps
        run: |
          python -m pip install --quiet --upgrade pip
          # kokoro (TTS) + sentencepiece (m2m100 tokenizer). transformers comes via kokoro.
          python -m pip install --quiet kokoro soundfile sentencepiece

      - name: Cache HuggingFace models (Kokoro + m2m100)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-m2m100-v1

      - name: Stamp
        run: echo "SHORTS_STAMP=$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Render Hindi Short
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXBAY_API_KEY: ${{ secrets.PIXBAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Authenticated HF downloads (faster/reliable; m2m100 is public, token optional).
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node shorts/build_short.mjs bharat

      - name: Auto-upload to YouTube (unlisted)
        if: ${{ secrets.YT_REFRESH_TOKEN_BHARAT != '' }}
        continue-on-error: true
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_BHARAT: ${{ secrets.YT_REFRESH_TOKEN_BHARAT }}
        run: node shorts/upload.mjs bharat "$SHORTS_STAMP"

      - name: Upload staged Short artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-bharat-${{ env.SHORTS_STAMP }}
          path: docs/shorts/bharat/
          retention-days: 7
          if-no-files-found: warn
