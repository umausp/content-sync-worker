name: shorts-bharat

# Render ONE Hindi/Hinglish Short for the @agyata_dot_com channel (India audience)
# from the freshest India story. The English story is LLM-translated to Hinglish
# (Devanagari + English proper nouns) before TTS + captions. Stages the MP4 + metadata
# for the human-approve gate; nothing uploads here.
#
# CADENCE: agyata-cron-pinger workflow_dispatch (offset from shorts-world). Public repo.
on:
  workflow_dispatch: {}

concurrency:
  group: shorts-bharat
  cancel-in-progress: false

permissions:
  contents: write

env:
  API_BASE: https://api.agyata.com
  SHORTS_PY: python
  # Hinglish translation uses the free LLM router keys (Gemini primary).
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: gemini-2.0-flash
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps (ffmpeg + librsvg + Devanagari fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin fonts-noto-core fonts-noto-cjk fonts-noto-extra

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kokoro TTS (Apache-2.0)
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet kokoro soundfile

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-hf-v1

      - name: Stamp
        run: echo "SHORTS_STAMP=$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Render Hindi Short
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node shorts/build_short.mjs bharat

      - name: Commit staged Short for review
        run: |
          git config user.name "agyata-shorts-bot"
          git config user.email "bot@agyata.com"
          git add docs/shorts/bharat/ || true
          if git diff --cached --quiet; then
            echo "nothing staged — not committing"
          else
            git commit -m "shorts(bharat): staged $SHORTS_STAMP for review"
            git push
          fi
