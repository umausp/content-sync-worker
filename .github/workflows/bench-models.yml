name: bench-models

# THROWAWAY benchmark: measure lightweight LLMs on the REAL GitHub CPU runner
# (4 vCPU, no GPU) for our two workloads — SYNTHESIS (multi-sentence JSON body,
# quality-critical) and TRIAGE (fast keep/drop/category/importance classification).
# Reports tokens/sec + eval_count + the ACTUAL output so we can judge speed AND
# quality before changing the pipeline. Manual only. Delete after we decide.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Serve Ollama
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          nproc; free -h

      - name: Benchmark each model (synth + triage)
        run: |
          set -e
          # Models to compare. qwen2.5:3b = current baseline. The rest = candidates.
          MODELS="qwen2.5:3b qwen3:0.6b gemma3:1b"

          # A realistic SYNTHESIS prompt: rewrite a cluster into a JSON story with a
          # multi-sentence body (this is where small models under-write → the 1.5b
          # failure mode we hit before).
          SYNTH='Rewrite this into a JSON news object. Return ONLY JSON: {"title":"...","summary":"one-line teaser","body":"3-4 complete factual sentences","hashtag":"OneWord","category":"business","importance":3}. FACTS: Reserve Bank of India kept the repo rate unchanged at 6.5% for the fourth straight meeting. Governor cited sticky food inflation. Markets had expected a hold. GDP growth forecast retained at 7%.'

          # A realistic TRIAGE prompt: classify 5 headlines (keep/drop/category/importance).
          TRIAGE='You are a news intake editor. For each numbered headline return JSON {"items":[{"i":N,"keep":true|false,"category":"...","importance":1-5}]}. HEADLINES:
          [0] RBI keeps repo rate unchanged at 6.5%
          [1] SHOCKING: You wont BELIEVE what this actor wore
          [2] ISRO successfully launches Earth observation satellite
          [3] Use code SAVE50 for 50% off shoes today only
          [4] Supreme Court reserves verdict on electoral bonds'

          run_one () {
            local MODEL="$1"; local LABEL="$2"; local PROMPT="$3"; local NPRED="$4"; local FMT="$5"
            local BODY
            BODY=$(jq -n --arg m "$MODEL" --arg p "$PROMPT" --argjson n "$NPRED" --arg f "$FMT" \
              '{model:$m, prompt:$p, stream:false, keep_alive:"5m", options:{temperature:0.2, num_predict:$n}} + (if $f=="json" then {format:"json"} else {} end)')
            local T0 T1 RESP
            T0=$(date +%s.%N)
            RESP=$(curl -sf http://127.0.0.1:11434/api/generate -d "$BODY")
            T1=$(date +%s.%N)
            local EVAL DUR TPS
            EVAL=$(echo "$RESP" | jq -r '.eval_count // 0')
            local WALL; WALL=$(echo "$T1 - $T0" | bc)
            TPS=$(echo "scale=1; $EVAL / $WALL" | bc 2>/dev/null || echo "?")
            echo "  [$LABEL] wall=${WALL}s eval_tokens=$EVAL  → ${TPS} tok/s"
            echo "  OUTPUT: $(echo "$RESP" | jq -r '.response' | tr '\n' ' ' | cut -c1-400)"
            echo ""
          }

          for M in $MODELS; do
            echo "================= $M ================="
            echo "pulling $M ..."; ollama pull "$M" >/dev/null 2>&1 || { echo "  !! PULL FAILED for $M (bad tag?) — skipping"; echo ""; continue; }
            # warm (load weights) so the timed run isn't a cold start
            curl -sf http://127.0.0.1:11434/api/generate -d "{\"model\":\"$M\",\"prompt\":\"hi\",\"stream\":false,\"keep_alive\":\"5m\",\"options\":{\"num_predict\":5}}" >/dev/null
            run_one "$M" "SYNTH " "$SYNTH"  300 json
            run_one "$M" "TRIAGE" "$TRIAGE" 200 json
          done
          echo "=== done. Compare tok/s (speed) AND whether SYNTH body is 3-4 real sentences (quality) ==="
