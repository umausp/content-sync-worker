name: shorts-longform

# Render a LONG-FORM (16:9, ~3 min, 10-story) news recap for the @AgyataWorld channel,
# then STAGE it for the human-approve gate. Long-form is the higher-RPM monetization
# format (long-form ad RPM ≈ 15-30x Shorts). Same engine as the Shorts, flipped to
# landscape via SHORTS_ORIENTATION=landscape. Nothing uploads here.
#
# CADENCE: agyata-cron-pinger workflow_dispatch (e.g. once/day). Public repo = free.
on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Target region for this run (usa | europe). Decides trend geos + playlist.'
        required: false
        default: ''

concurrency:
  group: shorts-longform
  cancel-in-progress: false

permissions:
  contents: read

env:
  API_BASE: https://api.agyata.com
  SHORTS_PY: python
  SHORTS_ORIENTATION: landscape # ← the switch: 1920x1080, 10 stories, 2 sentences each
  # ── LLM PROVIDER LADDER — same shared router as the news pipeline + shorts-world
  #    (src/providers.mjs via shorts/llm.mjs), NVIDIA-first, local Ollama last. This is
  #    what synthesises each story's clean, non-repetitive brief. ──
  PROVIDER_ORDER: 'nvidia,gemini,sambanova,cohere,openrouter,mistral,gitmodels,huggingface,openai,ollama'
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  NVIDIA_MODEL: 'meta/llama-3.3-70b-instruct'
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  COHERA_API_KEY: ${{ secrets.COHERA_API_KEY }}
  COHERE_MODEL: 'command-r-08-2024'
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: 'openrouter/free'
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  MISTRAL_MODEL: 'mistral-small-latest'
  GITMODELS_API_KEY: ${{ secrets.GITMODELS_API_KEY }}
  GITMODELS_MODEL: 'openai/gpt-4o-mini'
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '40'
  OLLAMA_MODEL: qwen2.5:3b # local last-resort so a summary is ALWAYS synthesised

jobs:
  render:
    runs-on: ubuntu-latest
    # Long-form is the heavy render (10-story, ~3 min video, Kokoro TTS + ffmpeg). The
    # 30-min ceiling was KILLING near-complete runs at 30m15s (user: "it was almost
    # completing"). Cron fires every ~3h so there's zero contention — give it a wide
    # ceiling: apt deps + Kokoro + (cold) Ollama pull + 10× multi-source extract/synth +
    # ffmpeg concat. cancel-in-progress:false → only this ceiling can kill it, so make it
    # the real deadline, not a clip point.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Node deps — the shared extractor (src/extract.mjs) needs
      # @extractus/article-extractor for the Readability path. Without this the module
      # falls back to JSON-LD + og only (still works, but weaker on non-schema.org sites).
      - name: Install Node deps
        run: npm install --no-audit --no-fund

      - name: Install system deps (ffmpeg + librsvg + espeak-ng + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin espeak-ng fonts-dejavu fonts-noto-core fonts-noto-cjk fonts-noto-extra

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kokoro TTS + m2m100 translation deps
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet kokoro soundfile sentencepiece

      - name: Cache HuggingFace models (Kokoro + m2m100)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-kokoro-m2m100-v1

      # OLLAMA — local last-resort LLM so every one of the 10 recap stories gets a clean
      # synthesised brief even when hosted providers 429. Best-effort (non-fatal).
      - name: Install + start Ollama (last-resort LLM)
        timeout-minutes: 6
        continue-on-error: true
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          ollama pull "${OLLAMA_MODEL:-qwen2.5:3b}" || echo "ollama pull failed — hosted providers carry the run"

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL || 'qwen2.5:3b' }}-v1

      - name: Stamp
        run: echo "SHORTS_STAMP=lf-$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Render long-form recap
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXBAY_API_KEY: ${{ secrets.PIXBAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          # Region (usa | europe) chosen by the cron-pinger; blank on a manual run → the
          # renderer falls back to wall-clock alternation.
          WORLD_REGION: ${{ inputs.region }}
          # Cross-run dedup: claim story keys via api.agyata.com before rendering so
          # overlapping Short/long-form runs never publish the same story.
          NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
        run: node shorts/build_short.mjs world

      # AUTO-UPLOAD to YouTube (unlisted). On success sets uploaded=true so the video is
      # NOT also published as a public artifact (user: delete results after upload).
      - name: Auto-upload to YouTube (unlisted)
        id: yt
        continue-on-error: true
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN_WORLD: ${{ secrets.YT_REFRESH_TOKEN_WORLD }}
          # Region → playlist (user: USA news → USA playlist, Europe news → Europe playlist).
          YT_PLAYLIST_USA: ${{ secrets.YT_PLAYLIST_USA }}
          YT_PLAYLIST_EUROPE: ${{ secrets.YT_PLAYLIST_EUROPE }}
        run: |
          if [ -z "$YT_REFRESH_TOKEN_WORLD" ]; then echo "no refresh token — skipping upload (artifact only)"; exit 0; fi
          node shorts/upload.mjs world "$SHORTS_STAMP"
          echo "uploaded=true" >> "$GITHUB_OUTPUT"

      # REVIEW COPY only — kept solely when the YouTube upload did NOT happen. On a PUBLIC
      # repo an artifact is publicly downloadable, so once the video is on YouTube we never
      # publish it here. 1-day retention even then.
      - name: Upload staged long-form artifact (only if NOT uploaded to YouTube)
        if: steps.yt.outputs.uploaded != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: longform-world-${{ env.SHORTS_STAMP }}
          path: docs/shorts/world/
          retention-days: 1
          if-no-files-found: warn

      # PURGE the rendered MP4 + metadata from the runner after upload — nothing rendered
      # lingers on GitHub. Always runs.
      - name: Purge staged output
        if: always()
        run: rm -rf docs/shorts/world/* || true
