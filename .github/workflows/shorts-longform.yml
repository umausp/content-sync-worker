name: shorts-longform

# Render a LONG-FORM (16:9, ~3 min, 10-story) news recap for the @AgyataWorld channel,
# then STAGE it for the human-approve gate. Long-form is the higher-RPM monetization
# format (long-form ad RPM ≈ 15-30x Shorts). Same engine as the Shorts, flipped to
# landscape via SHORTS_ORIENTATION=landscape. Nothing uploads here.
#
# CADENCE: agyata-cron-pinger workflow_dispatch (e.g. once/day). Public repo = free.
on:
  workflow_dispatch: {}

concurrency:
  group: shorts-longform
  cancel-in-progress: false

permissions:
  contents: write

env:
  API_BASE: https://api.agyata.com
  SHORTS_PY: python
  SHORTS_ORIENTATION: landscape # ← the switch: 1920x1080, 10 stories, 2 sentences each

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps (ffmpeg + librsvg + espeak-ng + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin espeak-ng fonts-dejavu fonts-noto-core fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kokoro TTS + phonemizer (Apache-2.0)
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet kokoro soundfile

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-hf-v1

      - name: Stamp
        run: echo "SHORTS_STAMP=lf-$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Render long-form recap
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXBAY_API_KEY: ${{ secrets.PIXBAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: node shorts/build_short.mjs world

      - name: Commit staged video for review
        run: |
          git config user.name "agyata-shorts-bot"
          git config user.email "bot@agyata.com"
          git add docs/shorts/world/ || true
          if git diff --cached --quiet; then
            echo "nothing staged — not committing"
          else
            git commit -m "longform(world): staged $SHORTS_STAMP for review"
            git push
          fi
