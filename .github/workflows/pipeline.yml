name: news-pipeline

# Full news pipeline on the GitHub runner (no external machine): fetch RSS →
# cluster → corroboration → LLM synth (Ollama on the runner) → gate → publish to
# the ingest API. Public repo = unlimited minutes. schedule + manual only —
# NEVER on pull_request (a fork PR must not read the secret).
#
# Split into OBSERVABLE STEPS (prod practice): install → cache → serve+pull →
# VERIFY model (fail-fast) → run pipeline. Each step has its own timeout and
# logs, so a hang is localized to one step instead of a 30-min black box.
on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min (UTC) — hosted inference is fast, so run more often for fresher news
  workflow_dispatch:
    inputs:
      source_mode:
        description: 'Source: gdelt | rss | both | auto (alternate by clock)'
        default: 'auto'

concurrency:
  group: news-pipeline
  cancel-in-progress: false # NEVER kill a run mid-publish — a new run QUEUES behind it (user ask). The pipeline is idempotent (dedup vs already-published), so an overlapping run is safe; runtime is now well under the 15-min cadence anyway.

permissions:
  contents: read

env:
  INGEST_URL: ${{ secrets.INGEST_URL }}
  STORIES_URL: ${{ secrets.STORIES_URL }}
  NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
  # ── LLM PROVIDER LADDER (registry in src/providers.mjs). FREE fast providers
  #    first, PAID OpenAI last (spillover only, tight cap), local Ollama last-
  #    resort. A provider is skipped if its key secret is absent. Models are the
  #    CHEAP/FAST tier — a title+summary rewrite needs nothing heavy. ──
  # Cloudflare excluded (billable creds in a public repo) + Groq excluded (no key).
  PROVIDER_ORDER: 'gemini,sambanova,cohere,openrouter,nvidia,mistral,gitmodels,openai,ollama' # cerebras dropped: 402 payment-required at $0 (Llama retired); deepinfra omitted (bills after credits); re-add either via PROVIDER_ORDER
  # free, very fast — PRIMARY
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  CEREBRAS_MODEL: 'gpt-oss-120b' # Cerebras retired Llama; gpt-oss-120b is their only Production model (reasoning_effort=low keeps it fast/cheap — set in providers.mjs)
  # free Flash TEXT model (NOT a *-live/realtime model). Override to your account's id.
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  # free tier (repo secret name is SOMBANOVA_API_KEY — code reads it as-is)
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  # free/trial tier (repo secret name is COHERA_API_KEY)
  COHERA_API_KEY: ${{ secrets.COHERA_API_KEY }}
  COHERE_MODEL: 'command-r-08-2024'
  # OpenRouter — aggregator; ':free' model = zero-cost pool (rate-limited, not billed).
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: 'meta-llama/llama-3.3-70b-instruct:free'
  # DeepInfra — OpenAI-compatible; free SIGNUP CREDITS then pay-per-use → OFF the default order (kept for re-add).
  DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
  DEEPINFRA_MODEL: 'meta-llama/Meta-Llama-3.1-8B-Instruct'
  # NVIDIA NIM — free API credits; OpenAI-compatible at integrate.api.nvidia.com/v1.
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  NVIDIA_MODEL: 'meta/llama-3.3-70b-instruct' # strong general model, free on dev-program credits (quality tier, ~40 RPM). qwen2.5-coder-32b was retired (410). Use meta/llama-3.1-8b-instruct for a faster/higher-RPM option.
  # Mistral La Plateforme — free experiment tier.
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  MISTRAL_MODEL: 'mistral-small-latest'
  # GitHub Models — free for GitHub users (rate-limited). Namespaced model IDs.
  GITMODELS_API_KEY: ${{ secrets.GITMODELS_API_KEY }}
  GITMODELS_MODEL: 'openai/gpt-4o-mini'
  # PAID — gpt-4o-mini (cheapest, highest RPM/TPM, NO wasted reasoning tokens; do
  # NOT use o3/o4-mini here — reasoning models cost more + are slower for a simple
  # rewrite). LAST in the ladder + tight cap → fires only if ALL free tiers are
  # exhausted, so in practice ≈ $0. Raise OPENAI_DAILY_CAP only if you accept spend.
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '80'
  OLLAMA_MODEL: qwen2.5:3b
  SYNTH_MIN_SCORE: '6'
  # LLM-synthesise the top SYNTH_HOSTED_MAX events (by score, AFTER triage keeps the
  # good ones); the score-sorted TAIL gets extractive (no-LLM) treatment. Kept at 90
  # — the front page only needs ~30-50 published, and synthesising 250+ was slow +
  # burned free-tier rate limits for stories that never surface. Fewer, better.
  # SYNTH_HARD_MAX is only the fallback ceiling when NO hosted provider is keyed.
  SYNTH_HARD_MAX: '48'
  SYNTH_HOSTED_MAX: '90'
  # QUALITY BAR for entering LLM synthesis (after dedup+url-check+triage): a story
  # must clear this triage-importance floor to earn the expensive LLM rewrite;
  # kept-but-lower items still publish via the free extractive tail. 3 = notable+.
  SYNTH_MIN_IMPORTANCE: '3'
  SYNTH_BATCH: '8'
  SYNTH_TIMEOUT_MS: '150000' # per BATCH of 8 (a batch generates ~1700 tokens)
  SYNTH_BUDGET_MS: '1200000' # 20-min budget; PREDICTIVE guard won't start a batch it can't finish before this, so on a slow runner it stops early + exits SUCCESS (step timeout 24m, job 25m give headroom for gate+publish)
  MIN_IMPORTANCE: '3'
  PUBLISH_MIN_SCORE: '11'
  PUBLISH_MIN_IMPORTANCE: '4'
  PUBLISH_MIN_CORROBORATION: '2'
  MAX_AGE_H: '36'
  VERIFY_FAITHFUL: '1' # budget-capped (VERIFY_BUDGET_MS) — verifies top stories only, no timeout risk
  VERIFY_BUDGET_MS: '240000'
  PER_FEED: '15'
  # GDELT global firehose as an extra corroboration source (src/gdelt/). DOC API
  # ArtList primary (real titles+images) → GKG raw-file fallback (unthrottled CDN)
  # when the API 429s. Best-effort; failure → RSS-only. Enabled on.
  GDELT_ENABLED: '1'
  GDELT_QUERY: 'sourcecountry:IN sourcelang:english'
  GDELT_MAX: '100'
  GDELT_TIMESPAN: '1h'
  GDELT_ENRICH: '1' # fetch real og:title+desc for GKG-sourced articles
  # BUZZ ENGINE — Google Trends (what India searches NOW) → Google News search. The
  # fix for "Twitter is buzzing but we don't have it": publisher RSS/GDELT lag the
  # trend (surface only after an outlet writes); Trends spikes in minutes. $0, no
  # auth. Merges into the pool tagged via='buzz'. National only (Trends geo=IN).
  BUZZ_ENABLED: '1'
  BUZZ_GEO: 'IN'
  BUZZ_HL: 'en-IN'
  BUZZ_MAX_TERMS: '10' # top-N trending terms to expand into news searches
  BUZZ_PER_TERM: '5' # articles per term
  # SEMANTIC DEDUP — a 3rd clustering signal (transformers.js/ONNX embeddings) that
  # catches "same event, different words" dupes the word-overlap+entity passes miss
  # (e.g. "What is Kimi K3" ~ "Moonshot AI unveils Kimi K3"). Fail-open: if the model
  # can't load, nothing merges → identical to before. Each merge is logged for audit
  # so the threshold can be tuned down with evidence. bge-base-en (CLS) for national.
  EMBED_DEDUP: '1'
  EMBED_MODEL: 'Xenova/bge-base-en-v1.5'
  EMBED_SIM_THRESHOLD: '0.80' # stepped 0.85→0.80 (1st live merge was clean); measured — a false merge is worse than a missed dupe; go lower only with more audit-log evidence
  EMBED_VERIFY: '1' # embedding topic-drift cross-check on the Ollama verifier's sameEvent (downgrade-only, fail-open)
  EMBED_VERIFY_MIN: '0.4' # synth vs source cosine below this = drifted off the source event

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm deps (transformers.js for semantic dedup)
        run: npm install --no-audit --no-fund

      # Cache the ONNX embedding model (transformers.js downloads to ~/.cache/
      # huggingface). ~110MB; cached so it's fetched once, not every run.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-embed-${{ env.EMBED_MODEL || 'bge-base-en-v1.5' }}-v1

      - name: Pick SOURCE_MODE
        run: |
          # DEFAULT = both (merged GDELT+RSS every run). Rotating gdelt/rss HALVED
          # per-run corroboration (a gdelt-only run can't corroborate vs RSS → fewer
          # clear the corr>=2 bar). Hosted inference removed the CPU reason to
          # isolate sources, so we merge for max corroboration. Force gdelt/rss via
          # workflow_dispatch only for A/B quality testing.
          REQ="${{ github.event.inputs.source_mode }}"
          MODE="both"
          if [ -n "$REQ" ] && [ "$REQ" != "auto" ]; then MODE="$REQ"; fi
          echo "SOURCE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "this run: SOURCE_MODE=$MODE"

      - name: Install Ollama
        timeout-minutes: 3
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v2

      - name: Start Ollama + pull model
        timeout-minutes: 8
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          echo "pulling $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "installed models:"; ollama list

      - name: Warm Ollama (best-effort, NON-fatal)
        timeout-minutes: 4
        continue-on-error: true
        run: |
          # Ollama is now the LAST-RESORT fallback behind 5 hosted providers, so this
          # is a best-effort cache warm, NOT a health gate. keep_alive pins the model
          # resident so IF the pipeline ever falls through to Ollama, batch 1 isn't a
          # cold start. The REAL health gate is provider-aware and lives in the
          # pipeline (healthCheck() → generate(), which pings the primary hosted
          # provider first). A failed warm here must never kill a run hosted
          # inference can serve — hence continue-on-error + no exit 1.
          echo "warming Ollama (best-effort)..."
          RESP=$(curl -sf http://127.0.0.1:11434/api/generate \
            -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"Write one sentence of news.\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_predict\":40}}") || true
          echo "response: $RESP"
          echo "$RESP" | grep -qi '"response"' && echo "ollama warm OK" || echo "ollama warm skipped (hosted providers carry the run)"

      - name: Run pipeline (gather → cluster → synth → gate → publish)
        timeout-minutes: 24
        run: node src/review.mjs
