name: news-pipeline

# Full news pipeline on the GitHub runner (no external machine): fetch RSS →
# cluster → corroboration → LLM synth (Ollama on the runner) → gate → publish to
# the ingest API. Public repo = unlimited minutes. schedule + manual only —
# NEVER on pull_request (a fork PR must not read the secret).
#
# Split into OBSERVABLE STEPS (prod practice): install → cache → serve+pull →
# VERIFY model (fail-fast) → run pipeline. Each step has its own timeout and
# logs, so a hang is localized to one step instead of a 30-min black box.
on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min (UTC) — hosted inference is fast, so run more often for fresher news
  workflow_dispatch:
    inputs:
      source_mode:
        description: 'Source: gdelt | rss | both | auto (alternate by clock)'
        default: 'auto'

concurrency:
  group: news-pipeline
  cancel-in-progress: true # a new run supersedes a stuck one instead of queueing

permissions:
  contents: read

env:
  INGEST_URL: ${{ secrets.INGEST_URL }}
  STORIES_URL: ${{ secrets.STORIES_URL }}
  NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
  # ── LLM PROVIDER LADDER (registry in src/providers.mjs). FREE fast providers
  #    first, PAID OpenAI last (spillover only, tight cap), local Ollama last-
  #    resort. A provider is skipped if its key secret is absent. Models are the
  #    CHEAP/FAST tier — a title+summary rewrite needs nothing heavy. ──
  # Cloudflare excluded (billable creds in a public repo) + Groq excluded (no key).
  PROVIDER_ORDER: 'cerebras,gemini,sambanova,cohere,openai,ollama'
  # free, very fast — PRIMARY
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  CEREBRAS_MODEL: 'llama-3.3-70b'
  # free Flash TEXT model (NOT a *-live/realtime model). Override to your account's id.
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  # free tier (repo secret name is SOMBANOVA_API_KEY — code reads it as-is)
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  # free/trial tier (repo secret name is COHERA_API_KEY)
  COHERA_API_KEY: ${{ secrets.COHERA_API_KEY }}
  COHERE_MODEL: 'command-r-08-2024'
  # PAID — gpt-4o-mini (cheapest, highest RPM/TPM, NO wasted reasoning tokens; do
  # NOT use o3/o4-mini here — reasoning models cost more + are slower for a simple
  # rewrite). LAST in the ladder + tight cap → fires only if ALL free tiers are
  # exhausted, so in practice ≈ $0. Raise OPENAI_DAILY_CAP only if you accept spend.
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '80'
  OLLAMA_MODEL: qwen2.5:3b
  SYNTH_MIN_SCORE: '6'
  # LLM-synthesise the top SYNTH_HOSTED_MAX events (by score, AFTER triage keeps the
  # good ones); the score-sorted TAIL gets extractive (no-LLM) treatment. Kept at 90
  # — the front page only needs ~30-50 published, and synthesising 250+ was slow +
  # burned free-tier rate limits for stories that never surface. Fewer, better.
  # SYNTH_HARD_MAX is only the fallback ceiling when NO hosted provider is keyed.
  SYNTH_HARD_MAX: '48'
  SYNTH_HOSTED_MAX: '90'
  SYNTH_BATCH: '8'
  SYNTH_TIMEOUT_MS: '150000' # per BATCH of 8 (a batch generates ~1700 tokens)
  SYNTH_BUDGET_MS: '1200000' # 20-min budget; PREDICTIVE guard won't start a batch it can't finish before this, so on a slow runner it stops early + exits SUCCESS (step timeout 24m, job 25m give headroom for gate+publish)
  MIN_IMPORTANCE: '3'
  PUBLISH_MIN_SCORE: '11'
  PUBLISH_MIN_IMPORTANCE: '4'
  PUBLISH_MIN_CORROBORATION: '2'
  MAX_AGE_H: '36'
  VERIFY_FAITHFUL: '1' # budget-capped (VERIFY_BUDGET_MS) — verifies top stories only, no timeout risk
  VERIFY_BUDGET_MS: '240000'
  PER_FEED: '15'
  # GDELT global firehose as an extra corroboration source (src/gdelt/). DOC API
  # ArtList primary (real titles+images) → GKG raw-file fallback (unthrottled CDN)
  # when the API 429s. Best-effort; failure → RSS-only. Enabled on.
  GDELT_ENABLED: '1'
  GDELT_QUERY: 'sourcecountry:IN sourcelang:english'
  GDELT_MAX: '100'
  GDELT_TIMESPAN: '1h'
  GDELT_ENRICH: '1' # fetch real og:title+desc for GKG-sourced articles

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pick SOURCE_MODE
        run: |
          # DEFAULT = both (merged GDELT+RSS every run). Rotating gdelt/rss HALVED
          # per-run corroboration (a gdelt-only run can't corroborate vs RSS → fewer
          # clear the corr>=2 bar). Hosted inference removed the CPU reason to
          # isolate sources, so we merge for max corroboration. Force gdelt/rss via
          # workflow_dispatch only for A/B quality testing.
          REQ="${{ github.event.inputs.source_mode }}"
          MODE="both"
          if [ -n "$REQ" ] && [ "$REQ" != "auto" ]; then MODE="$REQ"; fi
          echo "SOURCE_MODE=$MODE" >> "$GITHUB_ENV"
          echo "this run: SOURCE_MODE=$MODE"

      - name: Install Ollama
        timeout-minutes: 3
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v2

      - name: Start Ollama + pull model
        timeout-minutes: 8
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          echo "pulling $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "installed models:"; ollama list

      - name: Verify + WARM model (fail-fast health check)
        timeout-minutes: 4
        run: |
          echo "warming model (keep_alive 30m so batch 1 isn't a cold start)..."
          # A realistic-size generation loads weights + warms the runtime; keep_alive
          # pins the model resident so the first real batch doesn't pay cold-load
          # (observed: cold batch 1 = 267s vs warm ~140s).
          RESP=$(curl -sf http://127.0.0.1:11434/api/generate \
            -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"Write one sentence of news.\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_predict\":40}}")
          echo "response: $RESP"
          echo "$RESP" | grep -qi '"response"' || { echo "::error::model did not respond — aborting"; exit 1; }

      - name: Run pipeline (gather → cluster → synth → gate → publish)
        timeout-minutes: 24
        run: node src/review.mjs
