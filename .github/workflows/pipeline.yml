name: news-pipeline

# Full news pipeline on the GitHub runner (no external machine): fetch RSS →
# cluster → corroboration → LLM synth (Ollama on the runner) → gate → publish to
# the ingest API. Public repo = unlimited minutes. schedule + manual only —
# NEVER on pull_request (a fork PR must not read the secret).
#
# Split into OBSERVABLE STEPS (prod practice): install → cache → serve+pull →
# VERIFY model (fail-fast) → run pipeline. Each step has its own timeout and
# logs, so a hang is localized to one step instead of a 30-min black box.
on:
  schedule:
    - cron: '*/30 * * * *' # every 30 min (UTC)
  workflow_dispatch: {}

concurrency:
  group: news-pipeline
  cancel-in-progress: true # a new run supersedes a stuck one instead of queueing

permissions:
  contents: read

env:
  INGEST_URL: ${{ secrets.INGEST_URL }}
  STORIES_URL: https://api.agyata.com/news/stories
  NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
  # qwen2.5:3b — the quality/speed sweet spot. VERIFIED: writes full 2-4 sentence
  # bodies that pass the language gate (1.5b under-wrote → 29/48 rejected for
  # body_too_few_sentences), and at ~90s/batch of 8 it finishes the 48-story pool
  # in ~10min, inside budget. The earlier 3b timeouts were the 80-cap + 60s batch
  # timeout, not the model — both fixed below. Schema-grammar `format` stays OFF.
  OLLAMA_MODEL: qwen2.5:3b
  SYNTH_MIN_SCORE: '6'
  # Right-sized to what a CPU runner can synth in budget: candidates are
  # score-sorted, so the top 48 ARE the best; the low-priority tail is dropped.
  # 48 / SYNTH_BATCH(8) = 6 batches, comfortably within the 15-min budget.
  SYNTH_HARD_MAX: '48'
  SYNTH_BATCH: '8'
  SYNTH_TIMEOUT_MS: '150000' # per BATCH of 8 (a batch generates ~1700 tokens)
  SYNTH_BUDGET_MS: '1200000' # 20-min budget; PREDICTIVE guard won't start a batch it can't finish before this, so on a slow runner it stops early + exits SUCCESS (step timeout 24m, job 25m give headroom for gate+publish)
  MIN_IMPORTANCE: '3'
  PUBLISH_MIN_IMPORTANCE: '4'
  PUBLISH_MIN_CORROBORATION: '2'
  MAX_AGE_H: '36'
  VERIFY_FAITHFUL: '0' # 2nd-pass verifier off by default (doubles LLM calls)
  PER_FEED: '15'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ollama
        timeout-minutes: 3
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v2

      - name: Start Ollama + pull model
        timeout-minutes: 8
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          echo "pulling $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "installed models:"; ollama list

      - name: Verify + WARM model (fail-fast health check)
        timeout-minutes: 4
        run: |
          echo "warming model (keep_alive 30m so batch 1 isn't a cold start)..."
          # A realistic-size generation loads weights + warms the runtime; keep_alive
          # pins the model resident so the first real batch doesn't pay cold-load
          # (observed: cold batch 1 = 267s vs warm ~140s).
          RESP=$(curl -sf http://127.0.0.1:11434/api/generate \
            -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"Write one sentence of news.\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_predict\":40}}")
          echo "response: $RESP"
          echo "$RESP" | grep -qi '"response"' || { echo "::error::model did not respond — aborting"; exit 1; }

      - name: Run pipeline (gather → cluster → synth → gate → publish)
        timeout-minutes: 24
        run: node src/review.mjs
