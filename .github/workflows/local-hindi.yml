name: local-news-hindi

# HINDI LOCAL NEWS edition — the same pipeline as the national feed, but
# EDITION=local swaps in Hindi regional feeds + GDELT Hindi, the model writes in
# Hindi, and every story is tagged category=local for the app's "Local News"
# section. Runs HOURLY (deep-local news moves slower than national headlines).
# Separate concurrency group so it runs independently of the national pipeline.
# schedule + manual only — never on pull_request (fork PRs must not read secrets).
on:
  schedule:
    - cron: '25 * * * *' # hourly at :25 (offset from the national :*/30 to spread load)
  workflow_dispatch: {}

concurrency:
  group: local-news-hindi
  cancel-in-progress: true

permissions:
  contents: read

env:
  EDITION: local # ← the switch: Hindi feeds + GDELT Hindi + Hindi synth + category=local
  INGEST_URL: ${{ secrets.INGEST_URL }}
  STORIES_URL: ${{ secrets.STORIES_URL }}
  NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
  # Same provider ladder as national (registry in src/providers.mjs). Free-first,
  # OpenAI last+capped, Ollama last-resort. Skipped if a key is absent.
  PROVIDER_ORDER: 'cerebras,groq,gemini,sambanova,cloudflare,openai,ollama'
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  CEREBRAS_MODEL: 'llama-3.3-70b'
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_MODEL: 'llama-3.3-70b-versatile'
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CF_AI_TOKEN: ${{ secrets.CF_AI_TOKEN }}
  CF_DAILY_CAP: '100'
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '50'
  OLLAMA_MODEL: qwen2.5:3b # writes fluent Hindi (verified); local fallback
  SYNTH_MIN_SCORE: '5' # local news has thinner corroboration than national — a slightly lower synth gate
  SYNTH_HARD_MAX: '40'
  SYNTH_BATCH: '8'
  SYNTH_TIMEOUT_MS: '150000'
  SYNTH_BUDGET_MS: '1200000'
  MIN_IMPORTANCE: '3'
  PUBLISH_MIN_SCORE: '7'
  PUBLISH_MIN_IMPORTANCE: '3' # hyperlocal civic news is valuable at importance 3 (national bar is 4)
  PUBLISH_MIN_CORROBORATION: '1' # local stories often run in ONE regional outlet — corroboration is naturally low; the editorial gates carry quality here
  PUBLISH_SOLO_IMPORTANCE: '4'
  MAX_AGE_H: '48' # local news has a slightly longer useful life
  VERIFY_FAITHFUL: '1' # budget-capped (VERIFY_BUDGET_MS) — verifies top stories only, no timeout risk
  VERIFY_BUDGET_MS: '240000'
  PER_FEED: '20'
  # GDELT Hindi as the extra source (sourcelang:hindi). Same GKG-first strategy.
  GDELT_ENABLED: '1'
  GDELT_QUERY: 'sourcecountry:IN sourcelang:hindi'
  GDELT_MAX: '100'
  GDELT_TIMESPAN: '2h'
  GDELT_ENRICH: '1'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ollama
        timeout-minutes: 3
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v2

      - name: Start Ollama + pull model
        timeout-minutes: 8
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          echo "pulling $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "installed models:"; ollama list

      - name: Verify + WARM model (fail-fast health check)
        timeout-minutes: 4
        run: |
          RESP=$(curl -sf http://127.0.0.1:11434/api/generate \
            -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"एक वाक्य लिखें।\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_predict\":40}}")
          echo "response: $RESP"
          echo "$RESP" | grep -qi '"response"' || { echo "::error::model did not respond — aborting"; exit 1; }

      - name: Run LOCAL pipeline (Hindi → gate → publish)
        timeout-minutes: 24
        run: node src/review.mjs
