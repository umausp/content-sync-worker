name: local-news-hindi

# HINDI LOCAL NEWS edition — the same pipeline as the national feed, but
# EDITION=local swaps in Hindi regional feeds + GDELT Hindi, the model writes in
# Hindi, and every story is tagged category=local for the app's "Local News"
# section. Runs HOURLY (deep-local news moves slower than national headlines).
# Separate concurrency group so it runs independently of the national pipeline.
# schedule + manual only — never on pull_request (fork PRs must not read secrets).
on:
  schedule:
    - cron: '25 * * * *' # hourly at :25 (offset from the national :*/30 to spread load)
  workflow_dispatch: {}

concurrency:
  group: local-news-hindi
  cancel-in-progress: false # NEVER kill a run mid-publish — a new run QUEUES behind it (user ask). Idempotent pipeline → overlap is safe.

permissions:
  contents: read

env:
  EDITION: local # ← the switch: Hindi feeds + GDELT Hindi + Hindi synth + category=local
  INGEST_URL: ${{ secrets.INGEST_URL }}
  STORIES_URL: ${{ secrets.STORIES_URL }}
  NEWS_INGEST_TOKEN: ${{ secrets.NEWS_INGEST_TOKEN }}
  # Same provider ladder as national (registry in src/providers.mjs). Free-first,
  # OpenAI last+capped, Ollama last-resort. Skipped if a key is absent.
  # Cloudflare excluded (billable creds in public repo) + Groq excluded (no key).
  PROVIDER_ORDER: 'gemini,sambanova,cohere,openrouter,nvidia,mistral,gitmodels,openai,ollama' # cerebras dropped (402 at $0); deepinfra omitted (bills after credits)
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  CEREBRAS_MODEL: 'gpt-oss-120b' # Cerebras retired Llama; gpt-oss-120b is their only Production model (reasoning_effort=low keeps it fast/cheap — set in providers.mjs)
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: 'gemini-2.0-flash'
  SOMBANOVA_API_KEY: ${{ secrets.SOMBANOVA_API_KEY }}
  SAMBANOVA_MODEL: 'Meta-Llama-3.3-70B-Instruct'
  COHERA_API_KEY: ${{ secrets.COHERA_API_KEY }}
  COHERE_MODEL: 'command-r-08-2024'
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: 'meta-llama/llama-3.3-70b-instruct:free'
  DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
  DEEPINFRA_MODEL: 'meta-llama/Meta-Llama-3.1-8B-Instruct'
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  NVIDIA_MODEL: 'meta/llama-3.1-8b-instruct' # qwen2.5-coder-32b was retired (410 Gone) + a coding model; llama-3.1-8b is current + general
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  MISTRAL_MODEL: 'mistral-small-latest'
  GITMODELS_API_KEY: ${{ secrets.GITMODELS_API_KEY }}
  GITMODELS_MODEL: 'openai/gpt-4o-mini'
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_MODEL: 'gpt-4o-mini'
  OPENAI_DAILY_CAP: '50'
  OLLAMA_MODEL: qwen2.5:3b # writes fluent Hindi (verified); local fallback
  SYNTH_MIN_SCORE: '5' # local news has thinner corroboration than national — a slightly lower synth gate
  SYNTH_HARD_MAX: '40'
  SYNTH_BATCH: '8'
  SYNTH_TIMEOUT_MS: '150000'
  SYNTH_BUDGET_MS: '1200000'
  MIN_IMPORTANCE: '3'
  PUBLISH_MIN_SCORE: '7'
  PUBLISH_MIN_IMPORTANCE: '3' # hyperlocal civic news is valuable at importance 3 (national bar is 4)
  PUBLISH_MIN_CORROBORATION: '1' # local stories often run in ONE regional outlet — corroboration is naturally low; the editorial gates carry quality here
  PUBLISH_SOLO_IMPORTANCE: '4'
  MAX_AGE_H: '48' # local news has a slightly longer useful life
  VERIFY_FAITHFUL: '1' # budget-capped (VERIFY_BUDGET_MS) — verifies top stories only, no timeout risk
  VERIFY_BUDGET_MS: '240000'
  PER_FEED: '20'
  # GDELT Hindi as the extra source (sourcelang:hindi). Same GKG-first strategy.
  GDELT_ENABLED: '1'
  GDELT_QUERY: 'sourcecountry:IN sourcelang:hindi'
  GDELT_MAX: '100'
  GDELT_TIMESPAN: '2h'
  GDELT_ENRICH: '1'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ollama
        timeout-minutes: 3
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.OLLAMA_MODEL }}-v2

      - name: Start Ollama + pull model
        timeout-minutes: 8
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:11434/api/tags >/dev/null && break; sleep 1; done
          echo "pulling $OLLAMA_MODEL ..."
          ollama pull "$OLLAMA_MODEL"
          echo "installed models:"; ollama list

      - name: Warm Ollama (best-effort, NON-fatal)
        timeout-minutes: 4
        continue-on-error: true
        run: |
          # Ollama is the LAST-RESORT fallback behind the hosted providers now, so
          # this is a best-effort cache warm — NOT a health gate. The real gate is
          # provider-aware (pipeline healthCheck() → generate()). A failed warm must
          # never kill a run hosted inference can serve.
          RESP=$(curl -sf http://127.0.0.1:11434/api/generate \
            -d "{\"model\":\"$OLLAMA_MODEL\",\"prompt\":\"एक वाक्य लिखें।\",\"stream\":false,\"keep_alive\":\"30m\",\"options\":{\"num_predict\":40}}") || true
          echo "response: $RESP"
          echo "$RESP" | grep -qi '"response"' && echo "ollama warm OK" || echo "ollama warm skipped (hosted providers carry the run)"

      - name: Run LOCAL pipeline (Hindi → gate → publish)
        timeout-minutes: 24
        run: node src/review.mjs
